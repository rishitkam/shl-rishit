services:
  - type: web
    name: shl-recommender
    env: python
    plan: standard # 2GB RAM to support the BAAI/bge-reranker-base model
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENABLE_RERANKER
        value: "true"
      - key: ENABLE_QUERY_EXPANSION
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
